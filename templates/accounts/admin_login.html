{% extends 'base.html' %}

{% block title %}Admin Login - Face Analysis App{% endblock %}

{% block navbar %}
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">
            <i class="bi bi-stars me-2"></i>Face Analysis
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'home' %}">
                        <i class="bi bi-house-door me-1"></i>Home
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'login' %}">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Login
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'register' %}">
                        <i class="bi bi-person-plus me-1"></i>Register
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="{% url 'admin_login' %}" style="color: #ff006e !important;">
                        <i class="bi bi-shield-lock me-1"></i>Admin
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>
{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-5">
            <div class="card" style="border: 2px solid #ff006e; animation: fadeInUp 0.6s ease-out;">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <div style="animation: shake 1s ease-in-out;">
                            <i class="bi bi-shield-lock-fill" style="font-size: 4rem; background: linear-gradient(135deg, #ff006e, #ff4d00); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"></i>
                        </div>
                        <h2 class="mt-3" style="color: #ff006e; font-weight: 700;">Admin Login</h2>
                        <p style="color: #a0aec0;">Authorized access only</p>
                    </div>

                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="username" class="form-label">
                                <i class="bi bi-person-fill-lock me-1" style="color: #ff006e;"></i>Admin Username
                            </label>
                            <input type="text" name="username" class="form-control" id="username" placeholder="Enter admin username" required style="border-color: rgba(255, 0, 110, 0.3);">
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label">
                                <i class="bi bi-key-fill me-1" style="color: #ff006e;"></i>Admin Password
                            </label>
                            <input type="password" name="password" class="form-control" id="password" placeholder="Enter admin password" required style="border-color: rgba(255, 0, 110, 0.3);">
                        </div>

                        <button type="submit" class="btn w-100 py-3 mb-3" style="background: linear-gradient(135deg, #ff006e, #ff4d00); color: white; border: none; border-radius: 50px; font-weight: 600; box-shadow: 0 4px 15px rgba(255, 0, 110, 0.3);">
                            <i class="bi bi-shield-check me-2"></i>Admin Login
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <p style="color: #a0aec0;">
                            <a href="{% url 'login' %}" style="color: #00d4ff; text-decoration: none; font-weight: 600;">
                                <i class="bi bi-arrow-left me-1"></i>Back to User Login
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
        20%, 40%, 60%, 80% { transform: translateX(5px); }
    }
</style>
{% endblock %}
