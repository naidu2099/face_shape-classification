<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User - AI Style Studio</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .edit-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            padding: 20px;
        }
        .edit-card {
            max-width: 500px;
            width: 100%;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: white;
            transition: border-color 0.3s ease;
        }
        .form-group input:focus {
            border-color: var(--accent-color);
            outline: none;
            background: rgba(255, 255, 255, 0.08);
        }
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body>

    <div class="edit-wrapper">
        <div class="glass-panel edit-card">
            <h2 style="margin-bottom: 25px; text-align: center;">Edit User Details 👤</h2>
            
            <form action="{{ url_for('edit_user', user_id=user.id) }}" method="POST">
                <div class="form-group" style="margin-bottom: 15px;">
                    <label>Username</label>
                    <input type="text" name="username" value="{{ user.username }}" required>
                </div>
                
                <div class="form-group" style="margin-bottom: 15px;">
                    <label>Email Address</label>
                    <input type="email" name="email" value="{{ user.email }}" required>
                </div>
                
                <div class="form-group" style="margin-bottom: 15px;">
                    <label>Mobile Number</label>
                    <input type="text" name="mobile" value="{{ user.mobile }}" required pattern="\d{10}">
                </div>
                
                <div class="btn-group">
                    <button type="submit" class="btn" style="flex: 2;">Save Changes</button>
                    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary" style="flex: 1; text-align: center; text-decoration: none; display: flex; align-items: center; justify-content: center;">Cancel</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
